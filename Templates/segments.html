<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Segment Analysis | Vehicle Sales Dashboard</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.1/dist/chart.umd.min.js"></script>
</head>
<body>

    <nav class="navbar">
        <div class="nav-logo">Vehicle Sales Dashboard</div>
        <div class="nav-links">
            <a href="/">Dashboard</a>
            <a href="/sales">Sales</a>
            <a href="/brands">Brands</a>
            <a href="/segments">Segments</a>
            <a href="/insights">Insights</a>
        </div>
    </nav>

    <div class="dashboard">

        <header class="header">
            <h1>Segment &amp; Body Type Analysis</h1>
            <p>Breakdown of sales across market segments and vehicle body types</p>
        </header>

        <section class="charts-grid">
            <div class="chart-card">
                <h2>Sales by Segment</h2>
                <canvas id="segmentChart"></canvas>
            </div>

            <div class="chart-card">
                <h2>Sales by Body Type</h2>
                <canvas id="bodyChart"></canvas>
            </div>
        </section>

    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
