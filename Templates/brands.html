<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brand Analysis | Vehicle Sales Dashboard</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.1/dist/chart.umd.min.js"></script>
</head>
<body>

    <nav class="navbar">
        <div class="nav-logo">Vehicle Sales Dashboard</div>
        <div class="nav-links">
            <a href="/">Dashboard</a>
            <a href="/sales">Sales</a>
            <a href="/brands">Brands</a>
            <a href="/segments">Segments</a>
            <a href="/insights">Insights</a>
        </div>
    </nav>

    <div class="dashboard">

        <header class="header">
            <h1>Brand Analysis</h1>
            <p>Comparison of top vehicle manufacturers based on total sales performance</p>
        </header>

        <section class="charts-grid single-page-grid">

            <div class="chart-card wide-card">
                <h2>Top 10 Brands by Sales</h2>
                <canvas id="makeChart"></canvas>
            </div>

            <div class="chart-card">

    <h2>
        <i class="fas fa-chart-pie"></i>
        Brand Market Share View
    </h2>

    <canvas id="segmentChart"></canvas>

</div>

        </section>

    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
